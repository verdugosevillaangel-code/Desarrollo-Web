<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Verdugo Sevilla Angel Uriel - Ejercicio 22</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .formula-img { text-align: center; font-style: italic; font-size: 1.2rem; color: #555; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        label { font-weight: bold; min-width: 20px; }
        input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        #resultado { margin-top: 25px; padding: 15px; border-radius: 8px; background: #e8f0fe; color: #1967d2; font-weight: 500; min-height: 50px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Fórmula General</h2>
        <div class="formula-img">ax² + bx + c = 0</div>
        
        <div class="input-group">
            <label>a:</label>
            <input type="number" id="valA" placeholder="Coeficiente cuadrático">
        </div>
        <div class="input-group">
            <label>b:</label>
            <input type="number" id="valB" placeholder="Coeficiente lineal">
        </div>
        <div class="input-group">
            <label>c:</label>
            <input type="number" id="valC" placeholder="Término independiente">
        </div>

        <button onclick="resolverEcuacion()">Calcular x1 y x2</button>

        <div id="resultado">
            Ingresa los valores para obtener las raíces.
        </div>
    </div>

    <script src="script_ej22.js"></script>
</body>
</html>
